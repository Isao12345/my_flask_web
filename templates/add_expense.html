{% extends "base.html" %}
{% block title %}Add Expense{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-start justify-center">

  <div class="w-full max-w-lg bg-white rounded-2xl shadow p-6 space-y-6">

    <!-- Header -->
    <div>
      <h1 class="text-xl font-semibold">Add Expense</h1>
      <p class="text-sm text-gray-500">Record your spending</p>
    </div>

    <!-- Form -->
    <form method="POST" class="space-y-4">

      <!-- Title -->
      <div>
        <label class="block text-sm font-medium mb-1">Title</label>
        <input
          type="text"
          name="title"
          required
          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-red-400 focus:outline-none"
        >
      </div>

      <!-- Amount -->
      <div>
        <label class="block text-sm font-medium mb-1">Amount</label>
        <input
          type="number"
          step="0.01"
          name="amount"
          required
          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-red-400 focus:outline-none"
        >
      </div>

      <!-- Category -->
      {% if categories %}
  <select name="category_id" class="w-full border rounded-lg px-3 py-2">
    <option value="">-- Select category --</option>
    {% for c in categories %}
      <option value="{{ c.id }}">{{ c.name }}</option>
    {% endfor %}
  </select>
{% else %}
  <div class="text-sm text-gray-500">
    No categories yet.
    <a href="{{ url_for('categories') }}"
       class="text-blue-600 underline ml-1">
       Create one
    </a>
  </div>
{% endif %}

      <!-- Date -->
      <div>
        <label class="block text-sm font-medium mb-1">Date</label>
        <input
          type="date"
          name="date"
          required
          class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-red-400 focus:outline-none"
        >
      </div>

      <!-- Actions -->
      <div class="flex items-center justify-end gap-3 pt-4">
        <a
          href="{{ url_for('expenses') }}"
          class="text-sm text-gray-500 hover:underline"
        >
          Cancel
        </a>

        <button
          type="submit"
          class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-lg text-sm shadow"
        >
          Save
        </button>
      </div>

    </form>
  </div>

</div>
{% endblock %}
