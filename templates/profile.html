{% extends "base.html" %}
{% block title %}Profile{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto space-y-6">

  <!-- Header -->
  <div>
    <h1 class="text-2xl font-semibold text-gray-800">Profile</h1>
    <p class="text-sm text-gray-500">Manage your account information</p>
  </div>

  <!-- Profile Card -->
  <div class="bg-white rounded-2xl shadow p-6 space-y-6">

    <!-- Avatar -->
    <div class="flex items-center gap-4">
      <div
        class="w-16 h-16 rounded-full bg-blue-100
               flex items-center justify-center text-xl font-semibold text-blue-600"
      >
        {{ user.username[0]|upper }}
      </div>

      <div>
        <h2 class="text-lg font-semibold">{{ user.username }}</h2>
        <p class="text-sm text-gray-500">{{ user.email }}</p>
      </div>
    </div>

    <hr>

    <!-- Info -->
    <div class="grid sm:grid-cols-2 gap-4 text-sm">

      <div>
        <p class="text-gray-500">Username</p>
        <p class="font-medium text-gray-800">{{ user.username }}</p>
      </div>

      <div>
        <p class="text-gray-500">Email</p>
        <p class="font-medium text-gray-800">{{ user.email }}</p>
      </div>

    </div>

    <!-- Actions -->
    <div class="flex items-center justify-end gap-3 pt-4">
      <a
        href="{{ url_for('dashboard') }}"
        class="text-sm text-gray-500 hover:underline"
      >
        Back to Dashboard
      </a>

      <!-- future feature -->
      <button
        disabled
        class="bg-gray-200 text-gray-400 px-4 py-2 rounded-lg text-sm cursor-not-allowed"
        title="Coming soon"
      >
        Edit Profile
      </button>
    </div>

  </div>

</div>
{% endblock %}
