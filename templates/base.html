<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Expense Tracker{% endblock %}</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<!-- Navbar -->
<nav class="bg-white shadow">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center gap-6">
    <span class="font-semibold text-blue-600">Expense Tracker</span>

    <a href="/" class="text-sm hover:text-blue-600">Dashboard</a>
    <a href="/transactions" class="text-sm hover:text-blue-600">Transactions</a>
    <a href="/expenses" class="text-sm hover:text-blue-600">Expenses</a>
    <a href="/income" class="text-sm hover:text-blue-600">Income</a>
    <a href="/categories" class="text-sm hover:text-blue-600">Categories</a>
    <a href="/profile" class="text-sm hover:text-blue-600">Profile</a>
    <a href="/logout" class="ml-auto text-sm text-red-500 hover:underline">
      Logout
    </a>
  </div>
</nav>

<!-- Main content -->
<main class="max-w-6xl mx-auto px-6 py-8">
  {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="text-center text-sm text-gray-400 py-6">
  © 2026 Expense Tracker
</footer>

</body>
</html>
