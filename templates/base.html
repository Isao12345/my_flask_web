<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Expense Tracker{% endblock %}</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<!-- Navbar -->
<nav class="bg-white shadow">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center gap-6">

    <span class="font-semibold text-blue-600">Expense Tracker</span>

    {% set path = request.path %}

    <a href="/"
       class="nav-link {{ 'active' if path == '/' else '' }}">
      Dashboard
    </a>

    <a href="/transactions"
       class="nav-link {{ 'active' if path.startswith('/transactions') else '' }}">
      Transactions
    </a>

    <a href="/expenses"
       class="nav-link {{ 'active' if path.startswith('/expenses') else '' }}">
      Expenses
    </a>

    <a href="/income"
       class="nav-link {{ 'active' if path.startswith('/income') else '' }}">
      Income
    </a>

    <a href="/categories"
       class="nav-link {{ 'active' if path.startswith('/categories') else '' }}">
      Categories
    </a>

    <a href="/profile"
       class="nav-link {{ 'active' if path.startswith('/profile') else '' }}">
      Profile
    </a>

     <a href="/about"
       class="nav-link {{ 'active' if path.startswith('/profile') else '' }}">
      About
    </a>

    <a href="/logout"
       class="ml-auto text-sm text-red-500 hover:underline">
      Logout
    </a>

  </div>
</nav>

<!-- Main content -->
<main class="max-w-6xl mx-auto px-6 py-8">
  {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="text-center text-sm text-gray-400 py-6">
  © 2026 Expense Tracker
</footer>


<!-- animation -->
<style>
.nav-link {
  position: relative;
  font-size: 0.875rem;
  color: #374151;
  padding-bottom: 4px;
  transition: color 0.25s ease;
}

.nav-link:hover {
  color: #2563eb;
}

.nav-link::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 0%;
  height: 2px;
  background-color: #2563eb;
  transition: width 0.3s ease;
}

.nav-link:hover::after {
  width: 100%;
}

.nav-link.active {
  color: #2563eb;
  font-weight: 500;
}

.nav-link.active::after {
  width: 100%;
}
</style>


</body>
</html>
